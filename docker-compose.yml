services:
  donnum-api:
    container_name: donnum-donor-service
    build:
      context: ..
      dockerfile: donor-service/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=DonnumDonorService;User Id=sa;Password=${SQLSERVER_SA_PASSWORD:-Your_password123};TrustServerCertificate=True;
      - Messaging__Broker__HostName=donnum-message-broker
      - Messaging__Broker__Port=5672
      - Messaging__Broker__UserName=guest
      - Messaging__Broker__Password=guest
      - Messaging__Broker__ExchangeName=donor.events
    networks:
      - donnum-shared

networks:
  donnum-shared:
    external: true
    name: donnum-shared
